server {
    # Слушаем входящие HTTP‑запросы на порту 80
    listen 80;

    # Устанавливаем индексный файл — если запрашивается директория, Nginx будет искать index.php
    index index.php;

    # Указываем имя сервера (домен). В данном случае — localhost
    # Для продакшена замените на реальное доменное имя
    # Переменная из .env DOMAIN
    server_name localhost;

    # Корневая директория веб‑приложения — откуда Nginx будет отдавать файлы
    # В данном случае: /var/www/project/public
    # Переменная из .env ROOT_PATH
    root /project/public;

    # Блок location для обработки всех запросов (кроме .php и специальных случаев)
    location / {
        # Пытаемся найти запрошенный файл на диске ($uri)
        # Если файл не найден, перенаправляем запрос на index.php с передачей аргументов запроса
        try_files $uri /index.php$is_args$args;
    }

    # Блок location для обработки запросов к index.php (и index.php/...)
    # Обрабатывает только прямые запросы к index.php, остальные .php блокируются
    location ~ ^/index\.php(/|$) {
        # Передаём запрос на обработку PHP‑FPM (сервис php82-service на порту 9000)
        fastcgi_pass project_php_fpm:9000;

        # Разделяем путь на скрипт и путь после него (для корректной работы маршрутизации)
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        # Подключаем стандартные параметры FastCGI
        include fastcgi_params;

        # Указываем полный путь к скрипту на диске (разрешённый реальный путь)
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        # Устанавливаем DOCUMENT_ROOT как реальный путь (разрешённый)
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Настраиваем размер буфера для чтения ответа от PHP‑FPM
        fastcgi_buffer_size 128k;

        # Настраиваем количество и размер буферов для чтения ответа
        fastcgi_buffers 4 256k;

        # Устанавливаем максимальный размер буферов, которые могут быть заняты одновременно
        fastcgi_busy_buffers_size 256k;

        # Помечаем этот location как внутренний — он не может быть вызван напрямую извне
        # Это повышает безопасность: внешние запросы к index.php будут отклонены
        internal;
    }

    # Блок location для всех остальных .php‑файлов
    # Возвращает ошибку 404 (не найдено) для любых запросов к .php‑файлам, кроме index.php
    # Это дополнительная мера безопасности — предотвращает прямой доступ к другим PHP‑скриптам
    location ~ \.php$ {
        return 404;
    }

    # Путь к файлу логов ошибок Nginx для этого сервера
    error_log /var/log/nginx/project_error.log;

    # Путь к файлу логов доступа (записей о запросах) для этого сервера
    access_log /var/log/nginx/project_access.log;
}
